<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Wagora — Precision OS</title>
    <meta name="description" content="Wagora handles outreach, conversations, and closing. You handle delivery. Precision pipeline automation." />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph -->
    <meta property="og:title" content="Wagora — Precision OS" />
    <meta property="og:description" content="Pipeline automation. Outreach, conversations, and closing handled by Wagora." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.getwagora.com" />

    <!-- Theme color for mobile browser chrome -->
    <meta name="theme-color" content="#0D0F0C" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f3fbf5" media="(prefers-color-scheme: light)" />

    <!-- BUG-05 FIX: Apply saved theme synchronously BEFORE first paint to prevent flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('wagora-theme');
          var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = (saved === 'dark' || saved === 'light') ? saved : preferred;
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>

    <!-- Material Symbols for shell icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
