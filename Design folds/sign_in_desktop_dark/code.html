<!DOCTYPE html>

<html data-theme="dark" lang="en"><head>
<meta charset="utf-8"/>

<link rel="stylesheet" href="../styles/tokens.css"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script>(function(){var t=localStorage.getItem('wagora-theme');document.documentElement.setAttribute('data-theme',t||'light');})()</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<!-- Using Google Fonts to approximate Satoshi and Clash Display as per brand guidance -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "var(--background-primary)",
            "background-primary": "var(--background-primary)",
            "background-secondary": "var(--background-secondary)",
            "surface": "var(--background-primary)",
            "surface-card": "var(--surface-card)",
            "surface-elevated": "var(--surface-elevated)",
            "surface-neutral": "var(--background-primary)",
            "surface-container": "var(--surface-elevated)",
            "surface-container-low": "var(--background-secondary)",
            "surface-container-lowest": "var(--surface-card)",
            "surface-container-high": "var(--surface-elevated)",
            "surface-container-highest": "var(--surface-elevated)",
            "surface-bright": "var(--surface-card)",
            "surface-dim": "var(--background-secondary)",
            "surface-variant": "var(--surface-elevated)",
            "surface-tint": "var(--text-secondary)",
            "on-surface": "var(--text-primary)",
            "on-surface-variant": "var(--text-secondary)",
            "on-background": "var(--text-primary)",
            "on-primary": "var(--surface-card)",
            "on-secondary": "var(--surface-card)",
            "on-tertiary": "var(--surface-card)",
            "on-error": "var(--surface-card)",
            "on-primary-container": "var(--text-muted)",
            "on-secondary-container": "var(--surface-card)",
            "on-tertiary-container": "var(--text-muted)",
            "on-error-container": "var(--destructive)",
            "on-primary-fixed": "var(--text-primary)",
            "on-primary-fixed-variant": "var(--text-secondary)",
            "on-secondary-fixed": "var(--text-primary)",
            "on-secondary-fixed-variant": "var(--accent-primary)",
            "on-tertiary-fixed": "var(--text-primary)",
            "on-tertiary-fixed-variant": "var(--text-secondary)",
            "inverse-surface": "var(--text-primary)",
            "inverse-on-surface": "var(--background-primary)",
            "inverse-primary": "var(--border-default)",
            "accent-primary": "var(--accent-primary)",
            "accent-secondary": "var(--accent-secondary)",
            "operator-dark": "var(--text-primary)",
            "ally-slate": "var(--text-secondary)",
            "strategist-blue": "var(--accent-primary)",
            "signal-green": "var(--success)",
            "caution-amber": "var(--status-paused)",
            "critical-red": "var(--destructive)",
            "brand-teal": "var(--accent-primary)",
            "success": "var(--success)",
            "destructive": "var(--destructive)",
            "border-subtle": "var(--border-subtle)",
            "border-default": "var(--border-default)",
            "outline": "var(--text-muted)",
            "outline-variant": "var(--border-default)",
            "primary": "var(--text-primary)",
            "primary-container": "var(--text-primary)",
            "primary-fixed": "var(--border-default)",
            "primary-fixed-dim": "var(--border-default)",
            "secondary": "var(--accent-primary)",
            "secondary-container": "var(--accent-primary)",
            "secondary-fixed": "var(--surface-elevated)",
            "secondary-fixed-dim": "var(--border-default)",
            "tertiary": "var(--text-primary)",
            "tertiary-container": "var(--text-primary)",
            "tertiary-fixed": "var(--surface-elevated)",
            "tertiary-fixed-dim": "var(--border-default)",
            "error": "var(--destructive)",
            "error-container": "rgba(229, 62, 62, 0.15)",
          },
          borderRadius: {
            "DEFAULT": "var(--radius-xs)",
            "sm": "var(--radius-sm)",
            "md": "var(--radius-md)",
            "lg": "var(--radius-lg)",
            "xl": "var(--radius-lg)",
            "full": "var(--radius-pill)",
          },
          spacing: {
            "unit": "8px",
            "stack-sm": "4px",
            "stack-md": "12px",
            "stack-lg": "24px",
            "padding-card": "20px",
            "gutter-grid": "24px",
            "margin-page": "32px",
          },
          fontFamily: {
            "display-xl": ["'Clash Display'", "sans-serif"],
            "headline-lg": ["'Clash Display'", "sans-serif"],
            "headline-md": ["'Clash Display'", "sans-serif"],
            "label-caps": ["'Satoshi'", "sans-serif"],
            "body-lg": ["'Satoshi'", "sans-serif"],
            "body-md": ["'Satoshi'", "sans-serif"],
            "mono-data": ["'Geist Mono'", "monospace"],
          },
          fontSize: {
            "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "mono-data": ["14px", {"lineHeight": "1", "letterSpacing": "-0.01em", "fontWeight": "500"}],
            "headline-md": ["20px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "headline-lg": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "display-xl": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
          },
        },
      },
    }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glyph-watermark {
            opacity: 0.03;
            pointer-events: none;
            user-select: none;
            filter: grayscale(100%) invert(1);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-brand-satoshi min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Watermark Background -->
<div class="absolute inset-0 flex items-center justify-center z-0">
<span class="material-symbols-outlined text-[600px] glyph-watermark select-none" data-icon="robot_2">
            robot_2
        </span>
</div>
<!-- Content Container -->
<main class="relative z-10 w-full max-w-[400px] flex flex-col items-center px-6">
<!-- Logo Section -->
<div class="mb-10 flex flex-col items-center">
<div class="w-12 h-12 bg-primary flex items-center justify-center mb-4 rounded-lg">
<span class="material-symbols-outlined text-background text-3xl" data-icon="token" style="font-variation-settings: 'FILL' 1;">
                    token
                </span>
</div>
<p class="font-brand-clash font-extrabold text-xl tracking-widest uppercase text-on-surface">Wagora AI</p>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-8 shadow-2xl">
<header class="mb-8">
<h1 class="font-brand-clash text-display-xl text-on-surface mb-2">Welcome back.</h1>
<p class="font-body-md text-on-surface-variant">Please enter your credentials to access the operator console.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="email">Email Address</label>
<input class="w-full bg-surface-container border border-outline-variant/50 rounded-lg px-4 py-3 text-body-md focus:ring-1 focus:ring-strategist-blue focus:border-strategist-blue outline-none transition-all placeholder:text-on-surface-variant/30" id="email" placeholder="operator@wagora.ai" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="text-[11px] font-brand-satoshi text-strategist-blue hover:underline decoration-strategist-blue/30 transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container border border-outline-variant/50 rounded-lg px-4 py-3 text-body-md focus:ring-1 focus:ring-strategist-blue focus:border-strategist-blue outline-none transition-all placeholder:text-on-surface-variant/30" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary text-background font-label-caps text-body-md font-bold py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>SIGN IN</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-8 border-t border-outline-variant/20 text-center">
<p class="font-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-on-surface font-semibold hover:text-strategist-blue transition-colors" href="#">Request access</a>
</p>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-12 flex items-center gap-4 text-on-surface-variant/40 font-mono-data text-xs">
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-signal-green"></span>
<span>SYSTEM READY</span>
</div>
<span class="opacity-30">|</span>
<span>v2.4.0-STABLE</span>
<span class="opacity-30">|</span>
<span>SECURE LINK</span>
</div>
</main>
<!-- Decorative Corner Accents (Subtle Grid Elements) -->
<div class="fixed top-0 left-0 w-32 h-32 border-l border-t border-outline-variant/10 pointer-events-none m-8"></div>
<div class="fixed bottom-0 right-0 w-32 h-32 border-r border-b border-outline-variant/10 pointer-events-none m-8"></div>
<script>(function(){var t=localStorage.getItem('wagora-theme')||'light';document.documentElement.setAttribute('data-theme',t);var i=document.getElementById('theme-icon');if(i)i.textContent=t==='dark'?'light_mode':'dark_mode';})()</script>
<div id="wagora-theme-toggle-float" style="position:fixed;bottom:80px;left:16px;z-index:9998"><button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s;box-shadow:var(--shadow-card)" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button></div>
</body></html>
