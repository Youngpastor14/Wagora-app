<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: var(--background-primary);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- TopAppBar -->
<header class="bg-[var(--surface-card)] border-b border-[var(--border-default)] transition-all duration-200 ease-in-out flex justify-between items-center w-full px-6 h-16 sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-700">
<img alt="Operator Profile" class="w-full h-full object-cover" data-alt="A professional close-up portrait of a technology specialist in a high-tech control room environment. The lighting is moody and cinematic with soft blue and slate tones reflecting off modern surfaces. The individual has a focused, calm expression, embodying the Quiet Operator persona. The background is slightly out of focus, showing blurred server lights and minimalist architecture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_5wJI3lQiVItc6HdxejMN74kgqXJoG-6moLwyeW63M2ITTj-sLa7DM-gdqQbxbd_l3MtweeIMtjPpYtGRXdR0BKvNmio6oH3Pq3IWAjVGyflCsmzuWIzMCjftTVLX0vAOORt8C7tnVtNin3bY28oPwwdrqe_zZGNGn_TdB26JUoRcLtCwtkgMITz6wU1GD4UcS8NzIN3DoI8I4AdUHtcEHQv6usrUTLGhwP9zYtR9GLmHFZRFRaoQ5kaZ4zX24DskeQv4Bpb_U1w"/>
</div>
<h1 class="text-lg font-bold tracking-tighter text-[var(--text-primary)] dark:text-slate-50 font-display-xl">Wagora</h1>
</div>
<button class="p-2 hover:bg-[var(--background-secondary)] rounded-lg transition-all">
<button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:4px 8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button>
<span class="material-symbols-outlined text-[var(--text-primary)] dark:text-slate-50" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 text-center">
<!-- Geometric Empty State Icon -->
<div class="relative w-32 h-32 mb-8 flex items-center justify-center">
<div class="absolute inset-0 bg-strategist-blue/5 rounded-full scale-110"></div>
<div class="absolute inset-0 border border-slate-800/50 rounded-lg rotate-12"></div>
<div class="absolute inset-0 border border-slate-800 rounded-lg -rotate-6"></div>
<div class="relative bg-surface-container-low border border-slate-800 w-16 h-16 flex items-center justify-center rounded-lg shadow-xl shadow-black/50">
<span class="material-symbols-outlined text-strategist-blue text-4xl" data-icon="rocket_launch">rocket_launch</span>
</div>
</div>
<!-- Typography Cluster -->
<div class="max-w-xs space-y-3">
<h2 class="font-headline-md text-headline-md text-on-background tracking-tight">
                No campaigns running
            </h2>
<p class="font-body-md text-body-md text-on-tertiary-container max-w-[240px] mx-auto">
                Create a campaign and Wagora gets to work.
            </p>
</div>
<!-- Action Section -->
<div class="mt-10 w-full max-w-xs">
<button class="w-full py-4 px-6 bg-primary text-tertiary-container font-label-caps text-label-caps rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="add" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add</span>
                New campaign
            </button>
<p class="mt-4 font-body-md text-[12px] text-ally-slate italic">
                Precision automation ready for deployment.
            </p>
</div>
</main>
<!-- Floating Action Button Contextual Check: Home/Dashboard -> Render -->
<div class="fixed bottom-24 right-6 z-40">
<button class="w-14 h-14 bg-strategist-blue text-white rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="add">add</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[var(--surface-card)] border-t border-[var(--border-default)] ">
<!-- Dashboard Active -->
<a class="flex flex-col items-center justify-center text-[var(--text-primary)] dark:text-slate-50 bg-[var(--surface-elevated)] dark:bg-slate-800 rounded-md px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="Ads_Click">ads_click</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Campaigns</span>
</a>
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Prospects</span>
</a>
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="forum">forum</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Chats</span>
</a>
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="handshake">handshake</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Deals</span>
</a>
</nav>
