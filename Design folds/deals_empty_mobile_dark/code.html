<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: var(--background-primary);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface dark:text-slate-200 antialiased overflow-x-hidden min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 h-16 bg-[var(--surface-card)] border-b border-[var(--border-default)] transition-all duration-200 ease-in-out fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[var(--border-default)] dark:bg-slate-800 flex items-center justify-center overflow-hidden">
<img alt="Operator" class="w-full h-full object-cover" data-alt="A professional close-up portrait of a technology operator in a dimly lit, high-tech control room environment. The lighting is low-key with soft blue and slate tones reflecting off a clean, polished glass surface. The overall mood is serious and focused, adhering to a minimalist and refined aesthetic with sharp details and deep shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3_KXPv5oqB9CD8lBewsMfhUK-3_U-SxYhgTV4LmprXL_Rya7bbZKp1myzKBUrE-V0CE0ZL3EJ8eoK-RKMmBdlgUsga8lB3zIqW_0c2btzWDMFRhDC5VmclnviFMSA0q7X3lpd1BJPS9AlrgWrK0cvd-TbzTPLxX53rvYFfhtkUDz0WcRX9Z1xxTsGNjqjNqFWCqapqUCcZ0BZMhBvhsOEDjLjnkPGFRWOpSMLP8RUiuhteuFLFuZOa-iAVaQF_bGG3XIqVMyvvIc"/>
</div>
<span class="text-lg font-bold tracking-tighter text-[var(--text-primary)] dark:text-slate-50 font-[var(--font-display)]">Wagora</span>
</div>
<div class="flex items-center">
<button class="p-2 text-[var(--text-primary)] dark:text-slate-50 hover:bg-[var(--background-secondary)] rounded-lg transition-all">
<button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:4px 8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button>
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-16 pb-20">
<!-- Empty State Container -->
<div class="w-full max-w-sm text-center">
<!-- Geometric Icon / Abstract Visual -->
<div class="relative w-48 h-48 mx-auto mb-10 flex items-center justify-center">
<div class="absolute inset-0 border border-slate-800 rounded-full opacity-20 scale-110"></div>
<div class="absolute inset-0 border border-slate-700 rounded-xl rotate-45 opacity-10"></div>
<div class="bg-slate-900/40 border border-slate-800 w-32 h-32 flex items-center justify-center rounded-lg shadow-2xl">
<span class="material-symbols-outlined text-6xl text-[var(--text-primary)]" data-icon="handshake" style="font-variation-settings: 'wght' 200;">handshake</span>
</div>
<!-- Precision Accents -->
<div class="absolute top-0 right-0 w-2 h-2 bg-strategist-blue rounded-full"></div>
<div class="absolute bottom-4 left-4 w-1 h-1 bg-[var(--text-secondary)] rounded-full"></div>
</div>
<!-- Content -->
<div class="space-y-4">
<h1 class="font-headline-lg text-slate-100 tracking-tight">No closed deals yet</h1>
<p class="font-body-md text-[var(--text-secondary)] leading-relaxed max-w-[280px] mx-auto">
                    When Wagora closes a deal, the full summary appears here.
                </p>
</div>
<!-- Action / Button (Secondary Minimalist Style) -->
<div class="mt-12">
<button class="px-6 py-3 bg-operator-dark border border-slate-800 text-slate-200 font-label-caps hover:bg-slate-800 hover:border-slate-700 transition-all active:scale-95">
                    VIEW ACTIVE CAMPAIGNS
                </button>
</div>
</div>
<!-- Detail Decorative Element (The "Quiet Operator" signature) -->
<div class="mt-24 w-12 h-[1px] bg-slate-800"></div>
<div class="mt-4 font-mono-data text-[10px] uppercase tracking-[0.2em] text-[var(--text-primary)]">
            System status: nominal
        </div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[var(--surface-card)] border-t border-[var(--border-default)] ">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Dashboard</span>
</a>
<!-- Campaigns -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="Ads_Click">ads_click</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Campaigns</span>
</a>
<!-- Prospects -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Prospects</span>
</a>
<!-- Chats -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 hover:text-slate-600 dark:hover:text-slate-300 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="forum">forum</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Chats</span>
</a>
<!-- Deals (Active State) -->
<a class="flex flex-col items-center justify-center text-[var(--text-primary)] dark:text-slate-50 bg-[var(--surface-elevated)] dark:bg-slate-800 rounded-md px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="handshake" style="font-variation-settings: 'FILL' 1;">handshake</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Deals</span>
</a>
</nav>
</body></html>
