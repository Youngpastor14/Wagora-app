<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: var(--background-primary);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[var(--surface-card)] border-b border-[var(--border-default)] flex justify-between items-center w-full px-6 h-16 top-0 sticky z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[var(--border-default)] overflow-hidden">
<img alt="Operator Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a clean-cut technology operator with a neutral expression. The person is set against a soft, out-of-focus office background with high-key lighting. The overall aesthetic is minimalist, corporate, and trustworthy, using a palette of soft whites and cool greys to align with a premium light-mode UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZ0eil7zIAVOq-4Kecq6u4c0XCqgXkApPdbbgroW2s0jGCMTjYzOKYy2lSRGdK7zdcbKfhZ8iqecvNGDo05gXDPTRdxtnTM3P8T4T6ddp-dD8SZX2rd7rptOPEMk5_29rVgsAolmoKw438GXZjaZStgoHxJZu2pSLPCEy-gDKgWRte6wejRKzEki7yeWSv6GpMw4DwLo6E1LSLK06kFallRcAY7E0WPqYmNGT2ngD3d7QWxMP7wrXaCDRsLn2RkoUtnoAf-53_wMg"/>
</div>
<span class="text-lg font-bold tracking-tighter text-[var(--text-primary)] dark:text-slate-50 font-[var(--font-display)]">Wagora</span>
</div>
<div class="flex items-center">
<button class="p-2 transition-all duration-200 ease-in-out hover:bg-[var(--background-secondary)] rounded-lg">
<span class="material-symbols-outlined text-[var(--text-primary)] dark:text-slate-50">notifications</span>
</button>
</div>
</header>
<!-- Main Content: Empty State Canvas -->
<main class="flex-grow flex items-center justify-center px-8 py-12">
<div class="w-full max-w-sm flex flex-col items-center text-center">
<!-- Geometric Icon Container (Bento-style shadow/depth) -->
<div class="relative w-24 h-24 mb-stack-lg flex items-center justify-center">
<div class="absolute inset-0 bg-surface-container rounded-full opacity-50"></div>
<div class="relative z-10 w-16 h-16 bg-[var(--surface-card)] border border-border-subtle rounded-xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-4xl text-ally-slate" style="font-variation-settings: 'wght' 300;">group</span>
</div>
<!-- Subtle geometric decoration -->
<div class="absolute -top-2 -right-2 w-6 h-6 bg-strategist-blue/10 rounded-full border border-strategist-blue/20"></div>
<div class="absolute -bottom-1 -left-4 w-4 h-4 bg-primary/5 border border-outline-variant rotate-45"></div>
</div>
<!-- Empty State Typography -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">No prospects yet</h1>
<p class="font-body-md text-body-md text-ally-slate mb-stack-lg max-w-[240px]">
                Start a campaign. Wagora handles the rest.
            </p>
<!-- Action Area -->
<div class="flex flex-col gap-unit w-full">
<button class="bg-operator-dark text-white font-label-caps py-4 px-6 rounded transition-all duration-200 hover:bg-[var(--accent-primary-hover)] active:scale-[0.98]">
                    CREATE NEW CAMPAIGN
                </button>
<button class="bg-transparent border border-border-subtle text-operator-dark font-label-caps py-4 px-6 rounded transition-all duration-200 hover:bg-surface-container-low">
                    IMPORT CSV
                </button>
</div>
<!-- Knowledgeable Ally Note -->
<div class="mt-stack-lg flex items-start gap-2 text-left bg-surface-neutral p-stack-md border border-border-subtle rounded">
<span class="material-symbols-outlined text-strategist-blue text-lg">info</span>
<p class="font-body-md text-[13px] text-ally-slate leading-relaxed">
                    Wagora scans your ideal customer profiles automatically once a campaign is live.
                </p>
</div>
</div>
</main>
<!-- BottomNavBar (Semantic Shell) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[var(--surface-card)] border-t border-[var(--border-default)] ">
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined">ads_click</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Campaigns</span>
</div>
<!-- Active State: Prospects -->
<div class="flex flex-col items-center justify-center text-[var(--text-primary)] dark:text-slate-50 bg-[var(--surface-elevated)] dark:bg-slate-800 rounded-md px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Prospects</span>
</div>
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined">forum</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Chats</span>
</div>
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] dark:text-[var(--text-secondary)] px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined">handshake</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Deals</span>
</div>
</nav>
<!-- Content padding for bottom nav -->
<div class="h-20"></div>
<script>(function(){var t=localStorage.getItem('wagora-theme')||'light';document.documentElement.setAttribute('data-theme',t);var i=document.getElementById('theme-icon');if(i)i.textContent=t==='dark'?'light_mode':'dark_mode';})()</script>
<div id="wagora-theme-toggle-float" style="position:fixed;bottom:80px;left:16px;z-index:9998"><button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s;box-shadow:var(--shadow-card)" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button></div>
</body></html>
