<!DOCTYPE html>

<html data-theme="dark" lang="en"><head>
<meta charset="utf-8"/>

<link rel="stylesheet" href="../styles/tokens.css"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script>(function(){var t=localStorage.getItem('wagora-theme');document.documentElement.setAttribute('data-theme',t||'light');})()</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: var(--background-primary);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "var(--background-primary)",
            "background-primary": "var(--background-primary)",
            "background-secondary": "var(--background-secondary)",
            "surface": "var(--background-primary)",
            "surface-card": "var(--surface-card)",
            "surface-elevated": "var(--surface-elevated)",
            "surface-neutral": "var(--background-primary)",
            "surface-container": "var(--surface-elevated)",
            "surface-container-low": "var(--background-secondary)",
            "surface-container-lowest": "var(--surface-card)",
            "surface-container-high": "var(--surface-elevated)",
            "surface-container-highest": "var(--surface-elevated)",
            "surface-bright": "var(--surface-card)",
            "surface-dim": "var(--background-secondary)",
            "surface-variant": "var(--surface-elevated)",
            "surface-tint": "var(--text-secondary)",
            "on-surface": "var(--text-primary)",
            "on-surface-variant": "var(--text-secondary)",
            "on-background": "var(--text-primary)",
            "on-primary": "var(--surface-card)",
            "on-secondary": "var(--surface-card)",
            "on-tertiary": "var(--surface-card)",
            "on-error": "var(--surface-card)",
            "on-primary-container": "var(--text-muted)",
            "on-secondary-container": "var(--surface-card)",
            "on-tertiary-container": "var(--text-muted)",
            "on-error-container": "var(--destructive)",
            "on-primary-fixed": "var(--text-primary)",
            "on-primary-fixed-variant": "var(--text-secondary)",
            "on-secondary-fixed": "var(--text-primary)",
            "on-secondary-fixed-variant": "var(--accent-primary)",
            "on-tertiary-fixed": "var(--text-primary)",
            "on-tertiary-fixed-variant": "var(--text-secondary)",
            "inverse-surface": "var(--text-primary)",
            "inverse-on-surface": "var(--background-primary)",
            "inverse-primary": "var(--border-default)",
            "accent-primary": "var(--accent-primary)",
            "accent-secondary": "var(--accent-secondary)",
            "operator-dark": "var(--text-primary)",
            "ally-slate": "var(--text-secondary)",
            "strategist-blue": "var(--accent-primary)",
            "signal-green": "var(--success)",
            "caution-amber": "var(--status-paused)",
            "critical-red": "var(--destructive)",
            "brand-teal": "var(--accent-primary)",
            "success": "var(--success)",
            "destructive": "var(--destructive)",
            "border-subtle": "var(--border-subtle)",
            "border-default": "var(--border-default)",
            "outline": "var(--text-muted)",
            "outline-variant": "var(--border-default)",
            "primary": "var(--text-primary)",
            "primary-container": "var(--text-primary)",
            "primary-fixed": "var(--border-default)",
            "primary-fixed-dim": "var(--border-default)",
            "secondary": "var(--accent-primary)",
            "secondary-container": "var(--accent-primary)",
            "secondary-fixed": "var(--surface-elevated)",
            "secondary-fixed-dim": "var(--border-default)",
            "tertiary": "var(--text-primary)",
            "tertiary-container": "var(--text-primary)",
            "tertiary-fixed": "var(--surface-elevated)",
            "tertiary-fixed-dim": "var(--border-default)",
            "error": "var(--destructive)",
            "error-container": "rgba(229, 62, 62, 0.15)",
          },
          borderRadius: {
            "DEFAULT": "var(--radius-xs)",
            "sm": "var(--radius-sm)",
            "md": "var(--radius-md)",
            "lg": "var(--radius-lg)",
            "xl": "var(--radius-lg)",
            "full": "var(--radius-pill)",
          },
          spacing: {
            "unit": "8px",
            "stack-sm": "4px",
            "stack-md": "12px",
            "stack-lg": "24px",
            "padding-card": "20px",
            "gutter-grid": "24px",
            "margin-page": "32px",
          },
          fontFamily: {
            "display-xl": ["'Clash Display'", "sans-serif"],
            "headline-lg": ["'Clash Display'", "sans-serif"],
            "headline-md": ["'Clash Display'", "sans-serif"],
            "label-caps": ["'Satoshi'", "sans-serif"],
            "body-lg": ["'Satoshi'", "sans-serif"],
            "body-md": ["'Satoshi'", "sans-serif"],
            "mono-data": ["'Geist Mono'", "monospace"],
          },
          fontSize: {
            "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "mono-data": ["14px", {"lineHeight": "1", "letterSpacing": "-0.01em", "fontWeight": "500"}],
            "headline-md": ["20px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "headline-lg": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "display-xl": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
          },
        },
      },
    }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased selection:bg-strategist-blue selection:text-white">
<!-- Top AppBar -->
<header class="flex justify-between items-center w-full px-6 h-16 bg-slate-950 text-slate-50 border-b border-slate-800 docked full-width top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
<span class="material-symbols-outlined text-sm" data-icon="person">person</span>
</div>
<span class="text-lg font-bold tracking-tighter text-slate-50">Wagora</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-slate-50 transition-all duration-200 ease-in-out hover:bg-slate-900 p-2 rounded" data-icon="notifications">notifications</button>
</div>
</header>
<!-- Main Canvas -->
<main class="min-h-[calc(100vh-128px)] flex flex-col items-center justify-center px-8 text-center bg-[var(--background-primary)]">
<!-- Empty State Illustration/Icon -->
<div class="relative mb-stack-lg flex items-center justify-center">
<!-- Decorative Background Element -->
<div class="absolute w-48 h-48 bg-slate-900/20 rounded-full blur-3xl"></div>
<!-- Geometric Icon Container -->
<div class="relative w-24 h-24 flex items-center justify-center border border-slate-800 rounded-xl bg-slate-950 shadow-2xl">
<span class="material-symbols-outlined text-4xl text-slate-600" data-icon="group" style="font-variation-settings: 'wght' 200;">group</span>
<!-- Precision Corner Accents -->
<div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-slate-500 -translate-x-1 -translate-y-1"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-slate-500 translate-x-1 translate-y-1"></div>
</div>
</div>
<!-- Text Content -->
<div class="max-w-xs space-y-stack-md">
<h1 class="font-headline-md text-headline-md text-slate-50">No prospects yet.</h1>
<p class="font-body-md text-body-md text-[var(--text-muted)]">
                Start a campaign. Wagora handles the rest.
            </p>
</div>
<!-- Primary Action -->
<div class="mt-stack-lg">
<button class="bg-[var(--background-secondary)] text-slate-950 font-label-caps text-label-caps px-8 py-4 rounded-lg flex items-center gap-2 hover:bg-[var(--surface-card)] active:scale-95 transition-all shadow-lg">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                CREATE CAMPAIGN
            </button>
</div>
<!-- Secondary Information / Social Proof subtle hint -->
<div class="mt-16 flex items-center gap-4">
<div class="h-[1px] w-8 bg-slate-800"></div>
<span class="font-label-caps text-[10px] text-slate-600 tracking-[0.2em]">OPERATOR MODE ACTIVE</span>
<div class="h-[1px] w-8 bg-slate-800"></div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-slate-950 text-slate-50 border-t border-slate-800 font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider">
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span>Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="Ads_Click">ads_click</span>
<span>Campaigns</span>
</div>
<!-- Active Tab: Prospects -->
<div class="flex flex-col items-center justify-center text-slate-50 bg-slate-800 rounded-md px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span>Prospects</span>
</div>
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="forum">forum</span>
<span>Chats</span>
</div>
<div class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="handshake">handshake</span>
<span>Deals</span>
</div>
</nav>
<script>(function(){var t=localStorage.getItem('wagora-theme')||'light';document.documentElement.setAttribute('data-theme',t);var i=document.getElementById('theme-icon');if(i)i.textContent=t==='dark'?'light_mode':'dark_mode';})()</script>
<div id="wagora-theme-toggle-float" style="position:fixed;bottom:80px;left:16px;z-index:9998"><button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s;box-shadow:var(--shadow-card)" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button></div>
</body></html>
