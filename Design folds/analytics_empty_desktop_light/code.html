<body class="bg-background font-body-md text-on-background min-h-screen flex">

<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 border-r border-[var(--border-default)] bg-[var(--surface-card)] py-4 space-y-2 z-40">
<div class="px-6 mb-8">
<h1 class="text-lg font-bold text-[var(--text-primary)] dark:text-slate-50 font-[var(--font-display)]">Wagora</h1>
<p class="text-xs text-[var(--text-secondary)] font-[var(--font-display)] tracking-tight">Precision OS</p>
</div>
<nav class="flex-1 px-3 space-y-1">
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="dashboard">dashboard</span>
                Dashboard
            </a>
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="campaign">campaign</span>
                Campaigns
            </a>
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="group">group</span>
                Prospects
            </a>
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="forum">forum</span>
                Conversations
            </a>
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="handshake">handshake</span>
                Deals
            </a>
<!-- Active State: Analytics -->
<a class="flex items-center px-3 py-2 bg-[var(--surface-elevated)] text-[var(--text-primary)] dark:text-slate-50 font-semibold border-r-2 border-slate-900 dark:border-slate-50 transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="analytics">analytics</span>
                Analytics
            </a>
</nav>
<div class="px-3 pt-4 mt-auto border-t border-[var(--border-subtle)] space-y-1">
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="help">help</span>
                Support
            </a>
<a class="flex items-center px-3 py-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--background-secondary)] transition-all font-[var(--font-display)] text-sm tracking-tight" href="#">
<span class="material-symbols-outlined mr-3" data-icon="logout">logout</span>
                Logout
            </a>
</div>
</aside>
<div class="flex-1 md:ml-64 flex flex-col">

<header class="flex justify-between items-center h-16 px-6 w-full fixed top-0 z-30 bg-[var(--surface-card)] border-b border-[var(--border-default)] md:w-[calc(100%-16rem)]">

<span class="md:hidden material-symbols-outlined text-[var(--text-primary)]" data-icon="menu">menu</span>

</div>
<div class="flex items-center space-x-4">
<button class="p-2 text-[var(--text-secondary)] hover:bg-[var(--background-secondary)] transition-colors rounded">

<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 text-[var(--text-secondary)] hover:bg-[var(--background-secondary)] transition-colors rounded">

</button>

</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 flex items-center justify-center p-margin-page bg-surface-neutral">
<!-- Empty State Container -->
<div class="max-w-md w-full flex flex-col items-center text-center space-y-stack-md">
<!-- Abstract Data Visualization Ghost (Bento/Modern Style) -->
<div class="mb-stack-lg relative w-full h-64 bg-[var(--surface-card)] border border-border-subtle rounded-xl overflow-hidden p-6 flex flex-col justify-between shadow-sm">
<div class="flex items-center justify-between">
<div class="h-4 w-24 bg-[var(--background-secondary)] rounded"></div>
<div class="h-4 w-12 bg-[var(--background-secondary)] rounded"></div>
</div>
<div class="flex items-end space-x-3 h-32 justify-center">
<div class="w-8 bg-[var(--background-secondary)] rounded-t h-12"></div>
<div class="w-8 bg-[var(--background-secondary)] rounded-t h-24"></div>
<div class="w-8 bg-[var(--background-secondary)] rounded-t h-16"></div>
<div class="w-8 bg-[var(--surface-elevated)] rounded-t h-32"></div>
<div class="w-8 bg-[var(--background-secondary)] rounded-t h-20"></div>

</div>

<div class="absolute inset-0 flex items-center justify-center bg-white/40 backdrop-blur-[2px]">
<div class="bg-[var(--surface-card)] p-6 rounded-full border border-border-subtle shadow-md">
<span class="material-symbols-outlined text-strategist-blue text-4xl" data-icon="monitoring">monitoring</span>
</div>
</div>
<div class="space-y-2">
<div class="h-2 w-full bg-[var(--background-secondary)] rounded"></div>
<div class="h-2 w-2/3 bg-[var(--background-secondary)] rounded"></div>

<p class="font-body-md text-body-md text-ally-slate max-w-xs mx-auto">

                    </p>
</div>

<div class="pt-stack-lg flex items-center space-x-2">
<span class="h-2 w-2 rounded-full bg-caution-amber"></span>
<span class="text-xs font-mono-data text-ally-slate uppercase tracking-wider">Awaiting Signal</span>
</div>
</div>
</main>
</div>
