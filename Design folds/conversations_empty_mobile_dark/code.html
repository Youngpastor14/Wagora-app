<style>
        body {
            background-color: var(--background-primary);
            color: var(--background-primary);
            -webkit-font-smoothing: antialiased;
        }

<body class="font-body-md text-body-md overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-slate-950 text-slate-50 border-b border-slate-800 transition-all duration-200 ease-in-out">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-700">
<img alt="Operator Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a focused corporate operator in a dark, minimalist setting. The lighting is dramatic and low-key, highlighting clean lines and a composed expression. The background is a deep, matte black that merges with the overall Wagora precision aesthetic, maintaining a sense of steady accountability and strategic confidence." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4JnNCENrG1JdKM1EBxI5UrRXUIAmXQ-VkyVXplB0G7rMSR0dnKIyeNtqBnG8aQVtPGfNgLkwZo53W9jaDlkXwZdv-YNqTKSd-qB8bHNYi74YndnMdYRhveL941QgcyZmuK4jj4ygpgzwRJOVsfB78mnEyqjYDrz_qbyonrpjzN8WJySG6Iumpxj4Sm0D9Kxhwc4y5Xce-uMICn6M0XAKSj6XP_TjL0-7ia_-pZ8XIKsLP5G2bMW7RB0MNp4haaLDohHunha1n6oo"/>
</div>
<span class="text-lg font-bold tracking-tighter text-slate-50 font-[var(--font-display)]">Wagora</span>
</div>
<button class="w-10 h-10 flex items-center justify-center hover:bg-slate-900 rounded-lg transition-colors">
<button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:4px 8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button>
<span class="material-symbols-outlined text-slate-50" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content: Empty State Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center px-8 text-center pb-24">
<!-- Geometric Icon Container -->
<div class="relative mb-stack-lg flex items-center justify-center">
<!-- Subtle Background Geometry -->
<div class="absolute w-32 h-32 bg-strategist-blue/5 rounded-full blur-2xl"></div>
<div class="relative w-20 h-20 border border-slate-800 bg-slate-900/50 flex items-center justify-center rounded-xl">
<span class="material-symbols-outlined text-4xl text-[var(--text-secondary)]" data-icon="forum">forum</span>
<!-- High-Signal Precision Indicator -->
<div class="absolute -top-1 -right-1 w-3 h-3 bg-strategist-blue rounded-full border-2 border-background"></div>
</div>
</div>
<!-- Empty State Content -->
<div class="max-w-xs mx-auto">
<h1 class="font-headline-md text-headline-md text-on-background mb-stack-md">
                No conversations yet
            </h1>
<p class="font-body-md text-body-md text-ally-slate">
                Conversations appear when prospects reply. Your quiet operator is standing by to flag high-signal interactions.
            </p>
</div>
<!-- Action (Optional secondary for engagement) -->
<div class="mt-stack-lg">
<button class="bg-on-background text-primary px-6 py-2.5 font-label-caps rounded-lg flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all">
                View Campaigns
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-slate-950 text-slate-50 border-t border-slate-800">
<!-- Dashboard -->
<button class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider">Dashboard</span>
</button>
<!-- Campaigns -->
<button class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="Ads_Click">ads_click</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider">Campaigns</span>
</button>
<!-- Prospects -->
<button class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="group">group</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider">Prospects</span>
</button>
<!-- Chats (Active) -->
<button class="flex flex-col items-center justify-center text-slate-50 bg-slate-800 rounded-md px-3 py-1 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="forum" style="font-variation-settings: 'FILL' 1;">forum</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider font-bold">Chats</span>
</button>
<!-- Deals -->
<button class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 hover:text-slate-300 transition-transform active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="handshake">handshake</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider">Deals</span>
</button>
</nav>
