<style>
        body {
            background-color: var(--background-primary);
            color: var(--background-primary);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .typing-dot {
            width: 4px;
            height: 4px;
            background-color: var(--accent-primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md antialiased overflow-hidden h-screen flex flex-col">
<!-- Progress Top Bar -->
<div class="fixed top-0 left-0 w-full h-[2px] bg-accent-primary z-[60]"></div>
<!-- Header -->
<header class="flex items-center justify-between px-6 py-5 z-50">
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-accent-primary rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-background" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<span class="font-headline-md text-body-md tracking-tight uppercase">Wagora</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-elevated transition-colors">
<span class="material-symbols-outlined text-on-surface">dark_mode</span>
</button>
</header>
<!-- Chat Thread Area -->
<main class="flex-1 overflow-y-auto px-6 py-4 space-y-8 flex flex-col max-w-2xl mx-auto w-full">
<!-- Wagora Message -->
<div class="flex flex-col items-start space-y-2">
<span class="text-accent-primary text-label-xs font-semibold tracking-wider uppercase ml-1">Wagora</span>
<div class="bg-surface-card border border-border-subtle p-4 rounded-chat rounded-tl-none max-w-[90%]">
<p class="text-on-surface text-body-md">Tell me what you want to build. Be as specific or as broad as you want — Wagora will ask for what it needs.</p>
</div>
</div>
<!-- User Message -->
<div class="flex flex-col items-end space-y-2">
<div class="bg-surface-elevated border border-border-subtle p-4 rounded-chat rounded-tr-none max-w-[90%]">
<p class="text-on-surface text-body-md">Find 50 Lagos-based e-commerce founders and pitch them our brand identity package. Budget $1,500 to $5,000.</p>
</div>
</div>
<!-- Wagora Typing Indicator -->
<div class="flex flex-col items-start space-y-2">
<div class="flex items-center space-x-1 py-2 px-1">
<div class="typing-dot"></div>
<div class="typing-dot"></div>
<div class="typing-dot"></div>
</div>
</div>
</main>
<!-- Bottom Input Area -->
<footer class="bg-surface-card border-t border-border-subtle p-6 pb-8">
<div class="max-w-2xl mx-auto space-y-4">
<div class="relative flex items-end gap-3 bg-background border border-border-subtle rounded-xl p-3 focus-within:border-accent-primary transition-all">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-on-surface text-body-md resize-none py-2 px-1 placeholder:text-ally-slate" placeholder="Type your message..." rows="1"></textarea>
<button class="bg-accent-primary text-background p-2 rounded-lg flex items-center justify-center hover:opacity-90 transition-opacity active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
<div class="flex justify-center">
<button class="group flex items-center gap-1 text-ally-slate hover:text-on-surface transition-colors text-[13px] font-medium">
                    Set up manually instead
                    <span class="material-symbols-outlined text-[16px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</footer>
<!-- Background Decorative Visual -->
<div class="fixed inset-0 pointer-events-none -z-10 flex items-center justify-center opacity-5">
<div class="w-full h-full max-w-4xl max-h-4xl border border-accent-primary rounded-full blur-[120px]"></div>
</div>
<!-- Background Content Layer -->
<div class="fixed inset-0 -z-20">
<img class="w-full h-full object-cover opacity-20" data-alt="A sophisticated dark mode UI background featuring subtle carbon-fiber textures and deep void blacks. Thin cyan grid lines intersect at perfect intervals resembling a high-end command console. The lighting is moody and recessed with faint emerald hues glowing from the edges of the frame. The overall aesthetic is precision-engineered minimalism for a quiet operator." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAr4W4xMa2PzGbglLswtgD-WZg71avt0LPWZWkXqZQlrHCD6prWyVTwnE-To1rqLdQuP7fz0_ZMfRL4rZA0-1EYuS41ji4FeX7AIR_5FLNafOwWO4xfQm15UqzOe4ffqZZ4LmyZWrdPOER6agYPajMaZs7Za6cFYIbXg5YBCZGToLYGodDR02L5nFVuwBa6Nlp2iIOPzmJ78xd73jJFarX8V5GZqdze1iicx9mIUruykJbEaTHc2huYG0pbGclSz7fLw_nMZ3D1-bc"/>
</div>
<script>(function(){var t=localStorage.getItem('wagora-theme')||'light';document.documentElement.setAttribute('data-theme',t);var i=document.getElementById('theme-icon');if(i)i.textContent=t==='dark'?'light_mode':'dark_mode';})()</script>
<div id="wagora-theme-toggle-float" style="position:fixed;bottom:80px;left:16px;z-index:9998"><button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s;box-shadow:var(--shadow-card)" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button></div>
</body></html>
