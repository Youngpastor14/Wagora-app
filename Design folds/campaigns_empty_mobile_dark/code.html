<!DOCTYPE html>

<html data-theme="dark" lang="en"><head>
<meta charset="utf-8"/>

<link rel="stylesheet" href="../styles/tokens.css"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script>(function(){var t=localStorage.getItem('wagora-theme');document.documentElement.setAttribute('data-theme',t||'light');})()</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: var(--background-primary);
        }
    </style>
<script id="tailwind-config">

      theme: {
        extend: {
          colors: {
            "background": "var(--background-primary)",

            "surface-neutral": "var(--background-primary)",
            "surface-container": "var(--surface-elevated)",
            "surface-container-low": "var(--background-secondary)",
            "surface-container-lowest": "var(--surface-card)",
            "surface-container-high": "var(--surface-elevated)",
            "surface-container-highest": "var(--surface-elevated)",
            "surface-bright": "var(--surface-card)",
            "surface-dim": "var(--background-secondary)",
            "surface-variant": "var(--surface-elevated)",
            "surface-tint": "var(--text-secondary)",
            "on-surface": "var(--text-primary)",
            "on-surface-variant": "var(--text-secondary)",
            "on-background": "var(--text-primary)",
            "on-primary": "var(--surface-card)",
            "on-secondary": "var(--surface-card)",
            "on-tertiary": "var(--surface-card)",
            "on-error": "var(--surface-card)",
            "on-primary-container": "var(--text-muted)",
            "on-secondary-container": "var(--surface-card)",
            "on-tertiary-container": "var(--text-muted)",
            "on-error-container": "var(--destructive)",
            "on-primary-fixed": "var(--text-primary)",
            "on-primary-fixed-variant": "var(--text-secondary)",
            "on-secondary-fixed": "var(--text-primary)",
            "on-secondary-fixed-variant": "var(--accent-primary)",
            "on-tertiary-fixed": "var(--text-primary)",
            "on-tertiary-fixed-variant": "var(--text-secondary)",
            "inverse-surface": "var(--text-primary)",
            "inverse-on-surface": "var(--background-primary)",
            "inverse-primary": "var(--border-default)",
            "accent-primary": "var(--accent-primary)",
            "accent-secondary": "var(--accent-secondary)",
            "operator-dark": "var(--text-primary)",
            "ally-slate": "var(--text-secondary)",
            "strategist-blue": "var(--accent-primary)",
            "signal-green": "var(--success)",
            "caution-amber": "var(--status-paused)",
            "critical-red": "var(--destructive)",

            "outline-variant": "var(--border-default)",
            "primary": "var(--text-primary)",
            "primary-container": "var(--text-primary)",
            "primary-fixed": "var(--border-default)",
            "primary-fixed-dim": "var(--border-default)",
            "secondary": "var(--accent-primary)",
            "secondary-container": "var(--accent-primary)",
            "secondary-fixed": "var(--surface-elevated)",
            "secondary-fixed-dim": "var(--border-default)",
            "tertiary": "var(--text-primary)",
            "tertiary-container": "var(--text-primary)",
            "tertiary-fixed": "var(--surface-elevated)",
            "tertiary-fixed-dim": "var(--border-default)",
            "error": "var(--destructive)",
            "error-container": "rgba(229, 62, 62, 0.15)",
          },
          borderRadius: {
            "DEFAULT": "var(--radius-xs)",
            "sm": "var(--radius-sm)",
            "md": "var(--radius-md)",
            "lg": "var(--radius-lg)",
            "xl": "var(--radius-lg)",
            "full": "var(--radius-pill)",
          },
          spacing: {
            "unit": "8px",
            "stack-sm": "4px",
            "stack-md": "12px",
            "stack-lg": "24px",
            "padding-card": "20px",
            "gutter-grid": "24px",
            "margin-page": "32px",
          },
          fontFamily: {
            "display-xl": ["'Clash Display'", "sans-serif"],
            "headline-lg": ["'Clash Display'", "sans-serif"],
            "headline-md": ["'Clash Display'", "sans-serif"],
            "label-caps": ["'Satoshi'", "sans-serif"],
            "body-lg": ["'Satoshi'", "sans-serif"],
            "body-md": ["'Satoshi'", "sans-serif"],
            "mono-data": ["'Geist Mono'", "monospace"],
          },
          fontSize: {
            "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "mono-data": ["14px", {"lineHeight": "1", "letterSpacing": "-0.01em", "fontWeight": "500"}],

          },
        },
      },
    }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased overflow-hidden">
<!-- Main Wrapper -->
<div class="flex flex-col min-h-screen max-w-md mx-auto relative bg-[var(--background-primary)] text-slate-50">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[var(--background-primary)] border-b border-slate-800 flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center overflow-hidden">
<img alt="Operator Profile" class="w-full h-full object-cover" data-alt="A close-up professional portrait of a tech operator in a dark, minimalist studio. The lighting is low-key with subtle blue rim lighting on the shoulders, creating a focused and authoritative atmosphere. The style is modern and clean, fitting a high-end command console UI with deep blacks and sharp details." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbhoMnhMPq0C7Q6k6vsPBb9hwOiPlNku_V29cHVRCJJBJuwBTCgtCgImdyjm_bRd3ZDqFKsv5BqapVdsFwNUI3cTs6A_ZvzSF8G2GC9AWwQF6Md3rxzO69gULhNUIo2E3PhqyWM5wWCaX67ttVaU0gVaNwSYi99EuJ4ka2x-oCGbTw1KQF_2hiAfDB23i1O0mFyfkxLzjzjpaXkCGhQPSbYogKQF6tPwRw-G12VL7sqt-26znm9WZVKTBgxbiRlHtfGCVk9BREecE"/>
</div>
</div>
<h1 class="text-lg font-bold tracking-tighter text-slate-50 font-display-xl">Wagora</h1>
<button class="w-10 h-10 flex items-center justify-center transition-all duration-200 ease-in-out hover:bg-slate-900 rounded-lg">
<button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:4px 8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button>
<span class="material-symbols-outlined text-slate-50" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Canvas (Empty State) -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-16 pb-24 text-center">
<!-- Asymmetric Geometric Decorative Element -->
<div class="relative mb-8 w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 bg-strategist-blue/10 rounded-full blur-3xl"></div>
<div class="relative w-32 h-32 border border-slate-800 rounded-xl flex items-center justify-center bg-[var(--background-secondary)]">
<div class="absolute -top-2 -right-2 w-8 h-8 bg-strategist-blue rounded-lg flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-lg" data-icon="Ads_Click">ads_click</span>
</div>
<span class="material-symbols-outlined text-[var(--text-primary)] text-6xl" data-icon="campaign" style="font-variation-settings: 'wght' 200;">campaign</span>
</div>
<!-- Precision Markers -->
<div class="absolute top-0 left-4 w-1 h-1 bg-[var(--text-secondary)]"></div>
<div class="absolute bottom-4 right-0 w-1 h-1 bg-[var(--text-secondary)]"></div>
</div>
<!-- Content Group -->
<div class="space-y-4 max-w-[280px]">
<h2 class="font-headline-md text-headline-md text-slate-50">No campaigns.</h2>
<p class="font-body-md text-body-md text-[var(--text-muted)]">Create a campaign and Wagora finds the clients.</p>
</div>
<!-- Action Area -->
<div class="mt-10 w-full px-4">
<button class="w-full bg-[var(--background-secondary)] text-slate-950 font-bold py-4 rounded-lg text-body-md transition-transform active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="add">add</span>
                    New campaign
                </button>
<button class="w-full mt-4 bg-transparent border border-slate-800 text-[var(--text-muted)] font-medium py-3 rounded-lg text-body-md hover:bg-slate-900 transition-colors">
                    View templates
                </button>
</div>
<!-- Ally Insight (Small Footer Task Info) -->
<div class="mt-12 flex items-center gap-2 px-4 py-2 bg-slate-900/50 rounded-full border border-slate-800">
<span class="material-symbols-outlined text-strategist-blue text-[16px]" data-icon="info">info</span>
<span class="text-[11px] font-medium tracking-wide text-[var(--text-secondary)] uppercase">System Ready for Deployment</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[var(--background-primary)] border-t border-slate-800">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Dashboard</span>
</a>
<!-- Campaigns (Active) -->
<a class="flex flex-col items-center justify-center text-slate-50 bg-slate-800 rounded-md px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="Ads_Click">ads_click</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Campaigns</span>
</a>
<!-- Prospects -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Prospects</span>
</a>
<!-- Chats -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="forum">forum</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Chats</span>
</a>
<!-- Deals -->
<a class="flex flex-col items-center justify-center text-[var(--text-muted)] px-3 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="handshake">handshake</span>
<span class="font-[var(--font-display)] text-[10px] font-medium uppercase tracking-wider mt-1">Deals</span>
</a>
</nav>
</div>
</body></html>
