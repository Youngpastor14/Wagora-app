<style>
        body {
            background-color: var(--background-primary);
            color: var(--surface-card);
        }
        .watermark-overlay {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 20L80 80H20L50 20Z' fill='white' fill-opacity='0.03'/%3E%3C/svg%3E");

    body {
      min-height: max(884px, 100dvh);

<body class="font-body-md bg-background min-h-screen relative flex flex-col overflow-hidden">
<!-- Subtle Watermark Background -->
<div class="absolute inset-0 watermark-overlay"></div>
<!-- Top App Bar (Shell Component Logic) -->
<header class="flex justify-between items-center w-full px-6 py-4 max-w-md mx-auto z-10 border-b border-slate-800 bg-slate-950">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[var(--accent-primary)]" style="font-variation-settings: 'FILL' 1;">dataset</span>
<span class="text-xl font-bold tracking-tight text-[var(--accent-primary)] font-[var(--font-display)]">Wagora AI</span>
</div>
<div class="hidden">
<!-- Hidden as per shell rules for transactional screens -->
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 py-12 z-10">
<div class="w-full max-w-md bg-primary-container border border-border-subtle p-padding-card rounded-xl">
<!-- Header Section -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-stack-sm" style="font-family: var(--font-display); font-weight: 700;">Build your pipeline.</h1>
<p class="font-body-lg text-body-lg text-on-primary-container" style="font-family: var(--font-body);">Let Wagora run it.</p>
</div>
<!-- Form Section -->
<form class="space-y-stack-lg" onsubmit="return false;">
<div class="space-y-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-primary-container">Full name</label>
<input class="bg-operator-dark border border-border-subtle rounded-lg px-4 py-3 text-body-md focus:ring-1 focus:ring-strategist-blue focus:outline-none placeholder:text-slate-600" placeholder="Alex Operator" type="text"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-primary-container">Email</label>
<input class="bg-operator-dark border border-border-subtle rounded-lg px-4 py-3 text-body-md focus:ring-1 focus:ring-strategist-blue focus:outline-none placeholder:text-slate-600" placeholder="alex@operator.io" type="email"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-primary-container">Password</label>
<input class="bg-operator-dark border border-border-subtle rounded-lg px-4 py-3 text-body-md focus:ring-1 focus:ring-strategist-blue focus:outline-none placeholder:text-slate-600" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-on-background text-operator-dark font-semibold py-4 rounded-lg hover:opacity-90 transition-opacity flex justify-center items-center gap-2" type="submit">
<span class="font-label-caps">Get started</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="relative my-stack-lg flex items-center">
<div class="flex-grow border-t border-border-subtle"></div>
<span class="px-4 font-label-caps text-[10px] text-[var(--text-secondary)] uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-border-subtle"></div>
</div>
<!-- OAuth Button -->
<button class="w-full flex items-center justify-center gap-3 border border-border-subtle py-3 rounded-lg hover:bg-slate-900 transition-colors">
<img alt="Google" class="w-4 h-4 grayscale contrast-200" data-alt="The Google favicon icon displayed in a minimalist, high-contrast monochrome style to match a professional dark-themed user interface. The icon is small and centered within a ghost button, surrounded by a subtle slate border. The lighting is flat and modern, emphasizing the functional and clean aesthetic of the Wagora AI platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX1dMK2fPbELfME1ozQ3jkE0_jN4vYxOmUVqFJXRu2_hv-8D1KZ_GejEhrDuPqJ4cj5o-0jBM98ouf9degIzeQWaBQS9MzbFhBIdpa0lVsvCss8Zgda_WqSQ3lA2aKcXfpa-lRi5g_AYzeoMvu2-4gCnQs68Pd7GKMMOGisJrOrSzVCml5Co79ccIpzUgnUbqeueWztLQXM5i4TiZJL-ZSjT7NpxSRWxCz5CD_msvC0D9bo7tWvYgo7Kh0bRdXQxsL02gV8-Z_3SY"/>
<span class="font-body-md text-on-background">Sign up with Google</span>
</button>
<!-- Footer -->
<div class="mt-stack-lg text-center">
<p class="font-body-md text-on-primary-container">
                    Already have an account? 
                    <a class="text-on-background font-semibold hover:underline" href="#">Sign in</a>
</p>
</div>
</div>
</main>
<!-- Visual Background Element -->
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-teal-500/5 blur-[120px] rounded-full"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-strategist-blue/5 blur-[120px] rounded-full"></div>
<!-- Hidden Bottom Nav Bar Logic (Suppressed on Sign Up as per "Destination" Rule) -->
<script>(function(){var t=localStorage.getItem('wagora-theme')||'light';document.documentElement.setAttribute('data-theme',t);var i=document.getElementById('theme-icon');if(i)i.textContent=t==='dark'?'light_mode':'dark_mode';})()</script>
<div id="wagora-theme-toggle-float" style="position:fixed;bottom:80px;left:16px;z-index:9998"><button id="wagora-theme-toggle" style="background:var(--surface-elevated);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s;box-shadow:var(--shadow-card)" onclick="(function(){var h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('wagora-theme',n);document.getElementById('theme-icon').textContent=n==='dark'?'light_mode':'dark_mode'})()"><span id="theme-icon" class="material-symbols-outlined" style="font-size:18px">dark_mode</span></button></div>
